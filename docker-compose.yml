services:
  arobi-node:
    build: .
    image: arobi-network:3.2.1
    container_name: arobi-node
    restart: always
    ports:
      - "8099:8099"
      - "30333:30333"
    volumes:
      # Mounts your existing wallet + chain data directory
      # Edit AROBI_DATA_DIR in .env if your wallet is in a different location
      - type: bind
        source: ${AROBI_DATA_DIR}
        target: /home/arobi/.arobi
    environment:
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/api/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
